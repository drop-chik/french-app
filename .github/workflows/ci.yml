name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @french-app/shared-types build
          pnpm --filter @french-app/srs-engine build

      - name: Typecheck (api)
        run: pnpm --filter @french-app/api typecheck

      - name: Typecheck (web)
        run: pnpm --filter @french-app/web typecheck

      - name: Lint CSS custom properties
        run: pnpm lint:css

      - name: Test (srs-engine)
        run: pnpm --filter @french-app/srs-engine test

      - name: Test (api)
        run: pnpm --filter @french-app/api test

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @french-app/shared-types build
          pnpm --filter @french-app/srs-engine build

      - name: Build web app
        run: pnpm --filter @french-app/web build

      - name: Install Playwright browsers
        run: pnpm --filter @french-app/web exec playwright install chromium --with-deps

      - name: Serve built app + run Playwright smoke tests
        run: pnpm --filter @french-app/web exec playwright test
        env:
          # Spin up `vite preview` inside playwright via webServer once we
          # uncomment it in playwright.config.ts. For now we run against the
          # currently-deployed Vercel build — same surface the user sees.
          PLAYWRIGHT_BASE_URL: https://french-web-two.vercel.app
          # Credentials for the authenticated suite. If unset, auth.setup.ts
          # skips and the chromium-auth project is skipped too.
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
