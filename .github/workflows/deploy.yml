name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: team_zh4sSpQ249RQ1ai20Qlj8a67
  VERCEL_PROJECT_ID: prj_rL5fkZ4miFHXahgNm0i0YF6WfU6M

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build via Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
