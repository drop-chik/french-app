<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Inter is self-hosted via @fontsource — no external fonts request. -->

    <meta name="description" content="Изучай французский язык с умными карточками и AI" />
    <meta name="google-site-verification" content="gPpTzcqsJWlx3GWLjGDgZ1t_9kN3rT3XTMxAXKV1RMU" />

    <!-- PWA -->
    <meta name="application-name" content="FrenchUp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FrenchUp" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme color for light/dark, helps PWA and browser chrome -->
    <meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f10" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph / Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FrenchUp" />
    <meta property="og:title" content="FrenchUp — Учи французский с AI" />
    <meta property="og:description" content="Умные карточки, грамматика, диалоги, аудирование — всё в одном приложении." />
    <meta property="og:image" content="/pwa-icon-512.png" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FrenchUp — Учи французский с AI" />
    <meta name="twitter:description" content="Умные карточки, грамматика, диалоги, аудирование." />
    <meta name="twitter:image" content="/pwa-icon-512.png" />

    <title>FrenchUp — Учи французский</title>

    <!-- Schema.org structured data — gives Google enough context to
         render rich results (sitelinks, knowledge-panel snippet). One
         EducationalOrganization for the brand, one Course for the
         actual product offering. Static in index.html (not React-injected)
         so crawlers see it on first request without running JS. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "EducationalOrganization",
          "@id": "https://french-web-two.vercel.app/#org",
          "name": "FrenchUp",
          "description": "AI-powered French learning platform: vocabulary SRS, grammar, listening, reading, and conversation.",
          "url": "https://french-web-two.vercel.app/",
          "logo": "https://french-web-two.vercel.app/pwa-icon-512.png",
          "sameAs": []
        },
        {
          "@type": "Course",
          "name": "FrenchUp — Learn French from A1 to B2",
          "description": "Adaptive French course with spaced-repetition vocabulary, grammar topics, listening exercises, reading texts, and AI-powered conversation practice. Covers CEFR levels A1, A2, B1, B2.",
          "provider": { "@id": "https://french-web-two.vercel.app/#org" },
          "educationalLevel": ["A1", "A2", "B1", "B2"],
          "inLanguage": ["ru", "en"],
          "teaches": "French as a foreign language",
          "url": "https://french-web-two.vercel.app/",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "availability": "https://schema.org/InStock"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
